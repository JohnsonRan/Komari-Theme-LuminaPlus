<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="keywords"
      content="Komari-Theme-LuminaLite, LuminaLite, server monitor, real-time server status, server performance dashboard, monitoring tool" />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="Komari-Theme-LuminaLite" />
    <meta property="og:description" content="A Komari monitor theme." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Komari-Theme-LuminaLite" />
    <meta name="twitter:description" content="A Komari monitor theme." />
    <title>Komari-Theme-LuminaLite</title>
    <meta name="description" content="A Komari monitor theme." />
    <script>
      (() => {
        const appearances = new Set(["system", "light", "dark"]);
        const readAppearance = (key) => {
          const raw = localStorage.getItem(key);
          if (raw == null) return null;
          let value = raw;
          try {
            value = JSON.parse(raw);
          } catch {}
          if (!appearances.has(value)) return null;
          const normalized = JSON.stringify(value);
          if (raw !== normalized) localStorage.setItem(key, normalized);
          return value;
        };

        let appearance = "system";
        try {
          appearance = readAppearance("appearance") ?? readAppearance("appearance_default") ?? "system";
        } catch {
          appearance = "system";
        }
        const resolved =
          appearance === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : appearance;
        document.documentElement.dataset.appearance = resolved;
        document.documentElement.style.colorScheme = resolved;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = resolved === "dark" ? "#000000" : "#F5F5F7";

        try {
          const rawDepth = localStorage.getItem("komaritheme:dark-depth");
          if (rawDepth != null) {
            const parsedDepth = Number(rawDepth);
            const darkDepth = Number.isFinite(parsedDepth)
              ? Math.min(100, Math.max(0, Math.round(parsedDepth)))
              : 100;
            if (darkDepth !== 100) {
              document.documentElement.style.setProperty(
                "--dark-depth",
                String(darkDepth),
              );
            } else {
              document.documentElement.style.removeProperty("--dark-depth");
            }
          }
        } catch {}

        try {
          const rawBg = localStorage.getItem("komaritheme:bg");
          if (rawBg) {
            const bg = JSON.parse(rawBg);
            if (bg && bg.v === 1) {
              const sizes = new Set(["cover", "contain", "auto"]);
              const positions = new Set(["top", "center", "bottom"]);
              const parseImage = (value) =>
                typeof value === "string" &&
                (value === "none" || /^url\("[^\"'`()<>\\\s]+"\)$/.test(value))
                  ? value
                  : null;
              const dark = resolved === "dark";
              const desktop = parseImage(dark ? bg.darkDesktop : bg.lightDesktop) ?? "none";
              const mobile = parseImage(dark ? bg.darkMobile : bg.lightMobile) ?? desktop;
              const parsedAlpha =
                (typeof bg.alpha === "string" && bg.alpha.trim() !== "") ||
                typeof bg.alpha === "number"
                  ? Number(bg.alpha)
                  : Number.NaN;
              const alpha = Number.isFinite(parsedAlpha)
                ? Math.min(100, Math.max(0, Math.round(parsedAlpha)))
                : 100;
              const scrim = alpha >= 95 ? 0 : Math.round(((95 - alpha) / 95) * 16);
              const style = document.documentElement.style;
              style.setProperty("--bg-image-desktop", desktop);
              style.setProperty("--bg-image-mobile", mobile);
              style.setProperty("--bg-size", sizes.has(bg.size) ? bg.size : "cover");
              style.setProperty("--bg-position", positions.has(bg.position) ? bg.position : "center");
              style.setProperty("--surface-alpha", String(alpha));
              if (scrim > 0) {
                style.setProperty(
                  "--bg-scrim",
                  `color-mix(in srgb, var(--bg-0) ${scrim}%, transparent)`,
                );
              } else {
                style.removeProperty("--bg-scrim");
              }
            }
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root" class="relative z-30"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
